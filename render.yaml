services:
  - type: web
    name: arcop-website
    env: python
    pythonVersion: 3.12.12 
    buildCommand: pip install -r requirements.txt && FLASK_APP=app_ameliore.py flask db upgrade
    startCommand: gunicorn app_ameliore:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: arcop-db
          property: connectionString
    autoDeploy: true

databases:
  - name: arcop-db
    databaseName: arcop
    user: arcop
